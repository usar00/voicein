; voicein 設定ファイル
; このファイルを config.ini にコピーして編集してください:
;   cp config.example.ini config.ini

[voicein]
; OpenAI APIキー。空の場合は環境変数 OPENAI_API_KEY を使います。
api_key =

; 音声認識モデル。日本語精度重視なら gpt-4o-transcribe(既定)。
; 安価にするなら gpt-4o-mini-transcribe、互換は whisper-1。
model = gpt-4o-transcribe

; 認識言語。
language = ja

; 認識のヒント。固有名詞・専門用語・人名などを書いておくと精度が上がります。
; 例: Claude, Anthropic, ダメぽ, GNOME, Wayland
prompt =

; マイク音源。空なら既定の入力。`python -m voicein mics` で名前を確認できます。
; 例: alsa_input.pci-0000_00_1f.3.analog-stereo
mic_source =

; 効果音(録音開始/完了/エラー)の有無。
sounds = true

; デスクトップ通知の有無。
notify = true

; 1回の録音の最大秒数。
max_seconds = 60

; これより短い録音(誤タップ)は無視する秒数。
min_seconds = 0.3

; 「溜め」。キーをこの秒数押し続けてから録音を開始する(誤タップ・即ピコ防止)。
; 0 にすると押した瞬間に開始。0.1〜0.2 くらいが押し心地よい。
press_delay = 0.15

; プッシュトゥトークのキー -> 貼り付け方法 の対応。
; キー名は `python -m voicein keys` の最後に出る例を参照。
; 通常アプリ(Claude / ブラウザ / 入力欄)は ctrl+v、
; ターミナルは ctrl+shift+v が一般的。
[bindings]
KEY_RIGHTCTRL = ctrl+v
KEY_RIGHTSHIFT = ctrl+shift+v
